name: Record Daily Energy and Climate History

on:
  schedule:
    # Runs at 00:30 and 12:30 UTC every day to merge recent logs and prevent data loss from Tuya's short retention window
    - cron: '30 0,12 * * *'
  workflow_dispatch: {} # Allows manual trigger from GitHub UI for testing

jobs:
  record-history:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests firebase-admin

    - name: Run history recorder script
      env:
        TUYA_CLIENT_ID: ${{ secrets.TUYA_CLIENT_ID }}
        TUYA_CLIENT_SECRET: ${{ secrets.TUYA_CLIENT_SECRET }}
        FIREBASE_USER_UID: ${{ secrets.FIREBASE_USER_UID }}
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: python scripts/record_history.py
